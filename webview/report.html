<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src {{styleUri}}; script-src 'nonce-{{nonce}}';" />
    <link rel="stylesheet" href="{{styleUri}}" />
    <title>ImageLint Report</title>
  </head>
  <body>
    <div class="bg-shape bg-shape-a"></div>
    <div class="bg-shape bg-shape-b"></div>

    <header>
      <h1>ImageLint Audit</h1>
      <p id="summary">Scanning...</p>
      <button id="fixAllBtn">Fix All</button>
    </header>

    <main>
      <table>
        <thead>
          <tr>
            <th>Image</th>
            <th>Format</th>
            <th>Current</th>
            <th>Estimated</th>
            <th>Savings</th>
            <th>Recommendation</th>
          </tr>
        </thead>
        <tbody id="reportBody"></tbody>
      </table>
    </main>

    <script nonce="{{nonce}}" src="{{scriptUri}}"></script>
  </body>
</html>
