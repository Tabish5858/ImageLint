<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'none'; style-src {{styleUri}}; script-src 'nonce-{{nonce}}';" />
  <link rel="stylesheet" href="{{styleUri}}" />
  <title>ImageLint Report</title>
</head>

<body>
  <!-- Header -->
  <header class="header">
    <div class="header-left">
      <div class="logo">
        <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
          <rect width="28" height="28" rx="6" fill="var(--accent)" />
          <path d="M7 18l4-6 3 4 2-3 5 5H7z" fill="var(--accent-fg)" opacity="0.9" />
          <circle cx="18" cy="10" r="2.5" fill="var(--accent-fg)" opacity="0.9" />
        </svg>
      </div>
      <div>
        <h1 class="header-title">ImageLint</h1>
        <p class="header-subtitle">Audit Report</p>
      </div>
    </div>
    <div class="header-actions">
      <button id="rescanBtn" class="btn btn-secondary" title="Re-scan workspace">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor">
          <path
            d="M13.451 5.609l-.579-.939-1.068.812-.076.094c-.335.415-.927 1.146-1.545 2.072-.498.744-.985 1.548-1.35 2.352H7.661a5.88 5.88 0 0 0-.274-.554 8.572 8.572 0 0 0-1.07-1.509A11.855 11.855 0 0 0 4.292 5.91l-.076-.056-1.006.892.083.07c.396.335.863.812 1.297 1.35.417.516.779 1.07 1.04 1.617l.052.113h2.152l.038-.084c.327-.72.795-1.516 1.29-2.257.456-.684.935-1.324 1.327-1.802l1.012-.786-.05-.358zM8 1a7 7 0 1 0 0 14A7 7 0 0 0 8 1zm0 12.8A5.8 5.8 0 1 1 8 2.2a5.8 5.8 0 0 1 0 11.6z" />
        </svg>
        Rescan
      </button>
      <button id="fixAllBtn" class="btn btn-primary" title="Fix all issues with optimal actions" disabled>
        <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor">
          <path d="M14.431 3.323l-8.47 10-4.39-3.391.943-1.219 3.25 2.512 7.53-8.9 1.137.998z" />
        </svg>
        Fix All
      </button>
    </div>
  </header>

  <!-- Summary Cards -->
  <section class="summary-cards" id="summaryCards">
    <div class="card">
      <div class="card-icon card-icon-issues">
        <svg width="18" height="18" viewBox="0 0 16 16" fill="currentColor">
          <path
            d="M7.56 1h.88l6.54 12.26-.44.74H1.44l-.42-.74L7.56 1zm.44 1.7L2.84 13H13.16L8 2.7zM8.5 10V11h-1v-1h1zm0-1h-1V6h1v3z" />
        </svg>
      </div>
      <div class="card-content">
        <span class="card-value" id="issueCount">—</span>
        <span class="card-label">Issues Found</span>
      </div>
    </div>
    <div class="card">
      <div class="card-icon card-icon-savings">
        <svg width="18" height="18" viewBox="0 0 16 16" fill="currentColor">
          <path
            d="M10.067 0l.612.283 3.039 3.039.283.612v8.132l-.283.612-3.039 3.039-.612.283H5.933l-.612-.283-3.039-3.039L2 12.066V3.934l.283-.612L5.322.283 5.933 0h4.134zM5.968 1L3 3.968v8.064L5.968 15h4.064L13 12.032V3.968L10.032 1H5.968zM8 4a4 4 0 110 8 4 4 0 010-8zm0 1a3 3 0 100 6 3 3 0 000-6z" />
        </svg>
      </div>
      <div class="card-content">
        <span class="card-value" id="totalSavings">—</span>
        <span class="card-label">Potential Savings</span>
      </div>
    </div>
    <div class="card">
      <div class="card-icon card-icon-size">
        <svg width="18" height="18" viewBox="0 0 16 16" fill="currentColor">
          <path
            d="M1 3.5l.5-.5h13l.5.5v9l-.5.5h-13l-.5-.5v-9zm1 1.035V12h12V4.535L8.31 8.862h-.62L1 4.535zM13.03 4H2.97L8 7.825 13.03 4z" />
        </svg>
      </div>
      <div class="card-content">
        <span class="card-value" id="totalSize">—</span>
        <span class="card-label">Total Flagged Size</span>
      </div>
    </div>
    <div class="card">
      <div class="card-icon card-icon-formats">
        <svg width="18" height="18" viewBox="0 0 16 16" fill="currentColor">
          <path
            d="M14.5 2H9l-.35-.15-.65-.64-.65.64L7 2H1.5l-.5.5v10l.5.5h13l.5-.5v-10l-.5-.5zm-.5 10H2V3h4.65l.85.85h.01l.85-.85H14v9z" />
        </svg>
      </div>
      <div class="card-content">
        <span class="card-value" id="formatBreakdown">—</span>
        <span class="card-label">Format Breakdown</span>
      </div>
    </div>
  </section>

  <!-- Savings Progress -->
  <section class="savings-bar-section" id="savingsBarSection" style="display:none">
    <div class="savings-bar-header">
      <span class="savings-bar-label">Optimization Potential</span>
      <span class="savings-bar-pct" id="savingsPct">0%</span>
    </div>
    <div class="savings-bar-track">
      <div class="savings-bar-fill" id="savingsBarFill" style="width:0%"></div>
    </div>
  </section>

  <!-- Table -->
  <main>
    <div class="table-container" id="tableContainer" style="display:none">
      <table>
        <thead>
          <tr>
            <th class="th-severity"></th>
            <th class="th-file">File</th>
            <th class="th-format">Format</th>
            <th class="th-size">Current</th>
            <th class="th-estimated">Estimated</th>
            <th class="th-savings">Savings</th>
            <th class="th-actions">Actions</th>
          </tr>
        </thead>
        <tbody id="reportBody"></tbody>
      </table>
    </div>

    <!-- Empty State -->
    <div class="empty-state" id="emptyState" style="display:none">
      <svg width="64" height="64" viewBox="0 0 64 64" fill="none">
        <circle cx="32" cy="32" r="30" stroke="var(--success)" stroke-width="2" opacity="0.3" />
        <path d="M22 33l6 6 14-14" stroke="var(--success)" stroke-width="3" stroke-linecap="round"
          stroke-linejoin="round" />
      </svg>
      <h2>All Clear!</h2>
      <p>No unoptimized images found in your workspace.</p>
    </div>

    <!-- Loading State -->
    <div class="loading-state" id="loadingState">
      <div class="spinner"></div>
      <p>Analyzing images…</p>
    </div>
  </main>

  <script nonce="{{nonce}}" src="{{scriptUri}}"></script>
</body>

</html>
