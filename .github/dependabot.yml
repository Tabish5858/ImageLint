version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    target-branch: main
    schedule:
      interval: weekly
      day: monday
      time: '04:00'
      timezone: UTC
    labels:
      - dependencies
      - github-actions
    open-pull-requests-limit: 5
    commit-message:
      prefix: chore(actions)
    pull-request-branch-name:
      separator: '-'
    groups:
      github-actions:
        patterns:
          - '*'

  - package-ecosystem: npm
    directory: /
    target-branch: main
    schedule:
      interval: weekly
      day: monday
      time: '04:30'
      timezone: UTC
    labels:
      - dependencies
      - npm
    open-pull-requests-limit: 8
    commit-message:
      prefix: chore(deps)
    versioning-strategy: increase-if-necessary
    pull-request-branch-name:
      separator: '-'
    groups:
      npm-production:
        dependency-type: production
        patterns:
          - '*'
      npm-development:
        dependency-type: development
        patterns:
          - '*'
