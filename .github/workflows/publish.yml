name: Publish Extension

on:
  push:
    branches: [main]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Skip if version bump commit
        id: check
        run: |
          MSG=$(git log -1 --pretty=%s)
          if [[ "$MSG" == chore:* && "$MSG" == *"bump version"* ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node
        if: steps.check.outputs.skip == 'false'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        if: steps.check.outputs.skip == 'false'
        run: npm ci

      - name: Lint
        if: steps.check.outputs.skip == 'false'
        run: npm run lint

      - name: Compile tests
        if: steps.check.outputs.skip == 'false'
        run: npm run compile-tests

      - name: Install vsce
        if: steps.check.outputs.skip == 'false'
        run: npm install -g @vscode/vsce

      - name: Bump patch version
        if: steps.check.outputs.skip == 'false'
        run: npm version patch --no-git-tag-version

      - name: Package for each platform
        if: steps.check.outputs.skip == 'false'
        run: |
          TARGETS=(
            "darwin-arm64:@img/sharp-darwin-arm64 @img/sharp-libvips-darwin-arm64"
            "darwin-x64:@img/sharp-darwin-x64 @img/sharp-libvips-darwin-x64"
            "linux-x64:@img/sharp-linux-x64 @img/sharp-libvips-linux-x64"
            "linux-arm64:@img/sharp-linux-arm64 @img/sharp-libvips-linux-arm64"
            "alpine-x64:@img/sharp-linuxmusl-x64 @img/sharp-libvips-linuxmusl-x64"
            "alpine-arm64:@img/sharp-linuxmusl-arm64 @img/sharp-libvips-linuxmusl-arm64"
            "win32-x64:@img/sharp-win32-x64"
            "win32-ia32:@img/sharp-win32-ia32"
          )

          for entry in "${TARGETS[@]}"; do
            target="${entry%%:*}"
            pkgs="${entry#*:}"
            echo "=== Packaging for $target ==="
            rm -rf node_modules/@img dist/node_modules
            npm install --no-save --force --ignore-scripts $pkgs
            npm run build
            vsce package --target "$target" --no-dependencies --no-git-tag-version -o "imagelint-${target}.vsix"
          done

      - name: Publish all platform packages
        if: steps.check.outputs.skip == 'false'
        run: vsce publish --packagePath *.vsix --no-dependencies
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Push version bump back to repo
        if: steps.check.outputs.skip == 'false'
        run: |
          VERSION=$(node -p "require('./package.json').version")
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git commit -m "chore: bump version to v${VERSION}"
          git push
