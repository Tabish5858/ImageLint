name: Dependency Review

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: read

jobs:
  dependency-review:
    name: Review dependency changes
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check dependency graph status
        id: graph
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;

            try {
              const response = await github.request('GET /repos/{owner}/{repo}', {
                owner,
                repo
              });

              const status = response.data?.security_and_analysis?.dependency_graph?.status;
              const enabled = status === 'enabled';

              core.info(`Dependency Graph status: ${status ?? 'unknown'}`);
              core.setOutput('enabled', enabled ? 'true' : 'false');
            } catch (error) {
              core.warning(`Could not determine Dependency Graph status: ${error.message}`);
              core.setOutput('enabled', 'false');
            }

      - name: Dependency review
        if: steps.graph.outputs.enabled == 'true'
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

      - name: Dependency review skipped
        if: steps.graph.outputs.enabled != 'true'
        run: |
          echo "::warning::Dependency review skipped because Dependency Graph is disabled for this repository."
          echo "Enable Dependency Graph in Settings > Security and analysis to enforce this check."
